<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>K Street Person Profile Database</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f3ef;
      --panel: #fff;
      --ink: #1f2328;
      --muted: #656d76;
      --line: #d7d2c8;
      --accent: #216b68;
      --accent-dark: #174d4b;
      --warn: #9a5b00;
      --ok: #24733b;
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); line-height: 1.45; }
    header { background: #24302f; color: #fff; padding: 20px clamp(14px, 4vw, 40px); border-bottom: 5px solid var(--accent); }
    h1 { margin: 0 0 4px; font-size: clamp(1.35rem, 2.4vw, 2.2rem); letter-spacing: 0; }
    header p { margin: 0; color: #e8efec; max-width: 980px; }
    main { display: grid; grid-template-columns: minmax(0, 1fr) minmax(360px, 0.56fr); gap: 16px; padding: 16px clamp(10px, 3vw, 28px) 30px; align-items: start; }
    .toolbar, .export-panel, details, aside { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px; position: sticky; top: 0; z-index: 4; margin-bottom: 14px; }
    button, .file-button {
      border: 1px solid #9dbdbc; background: #e8f3f1; color: var(--accent-dark); border-radius: 6px;
      min-height: 38px; padding: 8px 11px; font-weight: 750; cursor: pointer;
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.warning { border-color: #d8bc81; background: #fff4dc; color: #6b4400; }
    button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible { outline: 3px solid #f2cc5d; outline-offset: 2px; }
    details { margin-bottom: 12px; padding: 12px 14px 14px; }
    details[open] { box-shadow: 0 1px 0 rgba(31,35,40,.03); }
    summary { cursor: pointer; font-weight: 850; font-size: 1.02rem; }
    .section-note { margin: 7px 0 12px; color: var(--muted); font-size: .9rem; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    label { display: grid; gap: 5px; font-weight: 760; color: #282b2f; }
    .full { grid-column: 1 / -1; }
    .hint { color: var(--muted); font-weight: 550; font-size: .8rem; }
    .tip {
      display: inline-flex; align-items: center; justify-content: center; width: 1.1rem; height: 1.1rem;
      border-radius: 50%; background: #e2eeec; color: var(--accent-dark); font-size: .75rem; margin-left: 4px; cursor: help;
    }
    input, textarea, select {
      width: 100%; border: 1px solid #bbc3c0; border-radius: 6px; padding: 8px 9px; font: inherit; background: #fff; color: var(--ink);
    }
    textarea { min-height: 88px; resize: vertical; }
    .short textarea { min-height: 56px; }
    .check-row { display: flex; align-items: flex-start; gap: 8px; font-weight: 700; }
    .check-row input { width: 18px; height: 18px; margin-top: 2px; flex: 0 0 auto; }
    .counter { color: var(--muted); text-align: right; font-size: .76rem; font-weight: 650; }
    .export-panel { padding: 14px; margin-bottom: 12px; }
    .export-panel h2, aside h2 { margin: 0 0 10px; font-size: 1.05rem; }
    .status { min-height: 24px; color: var(--muted); font-weight: 760; margin-bottom: 8px; }
    .status.ok { color: var(--ok); }
    .status.warn { color: var(--warn); }
    .warnings { color: var(--warn); font-size: .86rem; margin: 8px 0 0; }
    aside { position: sticky; top: 70px; padding: 14px; }
    pre { margin: 0; min-height: 460px; max-height: calc(100vh - 190px); overflow: auto; border-radius: 6px; padding: 12px; background: #17201f; color: #e8f5f1; font-size: .8rem; white-space: pre-wrap; word-break: break-word; }
    input[type="file"] { display: none; }
    @media (max-width: 1040px) { main { grid-template-columns: 1fr; } aside { position: static; } pre { max-height: 560px; } }
    @media (max-width: 660px) { .grid { grid-template-columns: 1fr; } .toolbar { position: static; } button, .file-button { width: 100%; } }
  </style>
</head>
<body>
  <header>
    <h1>K Street Person Profile Database</h1>
    <p>Durable, project-agnostic profiles for character bibles, NPC simulation, dialogue, narrative engines, game mechanics, and AI generation. Schema <strong>2.0.0</strong>.</p>
  </header>

  <main>
    <div>
      <div class="toolbar" aria-label="Primary actions">
        <button type="button" class="primary" id="submitBtn">Submit Descriptor</button>
        <button type="button" id="generateSummaryBtn">Generate Summary From Fields</button>
        <button type="button" id="generateAiBtn">Generate AI Context</button>
        <button type="button" id="copyJsonBtn">Copy JSON</button>
        <button type="button" id="copyMarkdownBtn">Copy Markdown</button>
        <button type="button" id="downloadAllBtn">Download All</button>
        <label class="file-button" for="importFile">Import JSON</label>
        <input id="importFile" type="file" accept="application/json,.json">
        <button type="button" class="warning" id="resetBtn">Reset</button>
      </div>

      <form id="profileForm"></form>

      <section class="export-panel" id="export-import">
        <h2>Export / Import</h2>
        <div class="grid">
          <button type="button" id="downloadFullJsonBtn">Full JSON</button>
          <button type="button" id="downloadCompactJsonBtn">Compact JSON</button>
          <button type="button" id="downloadMarkdownBtn">Markdown Profile</button>
          <button type="button" id="downloadAiContextBtn">AI Context Markdown</button>
          <button type="button" id="downloadGameSummaryBtn">Game Design Summary</button>
          <button type="button" id="downloadArtPromptBtn">Art Prompt</button>
          <button type="button" id="downloadDialoguePromptBtn">Dialogue Prompt</button>
          <button type="button" id="copyShareLinkBtn">Copy Share Link</button>
          <label class="full">GitHub Pages base URL
            <input id="github_pages_base_url" placeholder="https://lonnie-tisdale.github.io/friend-character-intake">
          </label>
          <label class="full">Latest share link
            <input id="latest_share_link" readonly>
          </label>
          <label class="full">Submission status
            <input id="submission_status" readonly>
          </label>
        </div>
        <p id="warnings" class="warnings"></p>
      </section>
    </div>

    <aside>
      <h2>Live JSON Preview</h2>
      <div id="status" class="status">Ready.</div>
      <pre id="jsonPreview" aria-live="polite"></pre>
    </aside>
  </main>

  <script>
    const SCHEMA_VERSION = "2.0.0";
    const LEGACY_SCHEMA_VERSION = "friend_descriptor_intake.v2";
    const SOURCE = "K Street Person Profile Database";
    const SUBMISSION_ENDPOINT = "https://formspree.io/f/xredwazb";

    const FIELD_SECTIONS = [
      {
        id: "identity",
        title: "Identity",
        note: "Basic person/profile identity. Contact information is private and should not be committed to public repos.",
        fields: [
          f("display_name", "Display name", "text", "Private review name or public-safe display name.", "Example: Jordan Rivera"),
          f("optional_contact", "Optional contact", "text", "Private follow-up contact if the person permits clarification.", "name@email.com"),
          f("in_world_name_or_nickname", "In-world name or nickname", "text", "Reusable character handle for fiction, games, and prompts.", "The Compass"),
          f("pronouns", "Pronouns", "text", "Supports respectful dialogue and profile generation.", "they/them"),
          f("age_range", "Age range", "text", "Keeps profiles useful without over-collecting precise personal data.", "30s"),
          f("current_location_or_usual_setting", "Current location or usual setting", "textarea", "Where the person is usually imagined or encountered.", "Usually near a planning board, laptop open, coffee nearby."),
          f("consent_notes", "Consent and use notes", "textarea", "Records usage limits, approvals, and review context.", "May be used as a fictionalized support character; avoid private family details."),
          b("permission_to_store", "Permission to store this descriptor", "Required before keeping submissions."),
          b("permission_to_use_as_fictional_character", "Permission to use as a fictionalized character", "Required before adapting into projects."),
          b("permission_to_use_for_art_prompts", "Permission to use for art prompts", "Controls whether visual prompt fields can be reused."),
          b("permission_to_reuse_across_projects", "Permission to reuse across projects", "Useful for shared K Street profile databases."),
          b("permission_to_contact_for_clarification", "Permission to contact for clarification", "Allows follow-up questions.")
        ]
      },
      {
        id: "appearance",
        title: "Appearance",
        note: "Visual cues for art, prose, and casting without requiring public source images.",
        fields: [
          f("visual_descriptors", "Visual descriptors", "textarea", "Recognition cues: silhouette, posture, facial cues, hair, presence.", "Alert eyes, practical haircut, memorable glasses, relaxed posture."),
          f("clothing_style_props", "Clothing, style, and props", "textarea", "Useful for art prompts and character staging.", "Layered jacket, tidy sneakers, notebook, reliable pen."),
          f("default_expression", "Default expression", "text", "A fast visual anchor for illustration and NPC idle states.", "Listening carefully with one eyebrow raised."),
          f("movement_body_language", "Movement and body language", "textarea", "How the character occupies space and communicates nonverbally.", "Still when thinking; precise hand motions when explaining."),
          f("source_image_notes", "Source image notes", "textarea", "Private references or folder notes. Do not put private images in public repos.", "Source Images/Person Name contains approved private references."),
          f("art_prompt_summary", "Art prompt summary", "textarea", "Concise art-generation prompt derived from the profile.", "Grounded modern strategist, warm but analytical, practical layered clothing, notebook prop.")
        ]
      },
      {
        id: "personality",
        title: "Personality",
        note: "Stable traits, strengths, flaws, and recognizable habits.",
        fields: [
          l("personality_traits", "Personality traits", "Useful trait tags for filtering and generation.", "observant\nloyal\npragmatic"),
          l("custom_traits", "Custom traits", "Nuanced traits that standard lists miss.", "quietly theatrical when comfortable"),
          l("strengths", "Strengths", "Competencies that shape story and mechanics.", "pattern recognition\ngroup coordination"),
          l("flaws", "Flaws", "Limitations that create believable conflict.", "over-functions\nimpatient with vagueness"),
          l("recurring_habits", "Recurring habits", "Small repeated actions that make the character recognizable.", "keeps lists\nremembers tiny preferences"),
          l("temptations", "Temptations", "What pulls them off course.", "taking control too quickly\nsolving instead of asking")
        ]
      },
      {
        id: "motivation_values",
        title: "Motivation & Values",
        note: "What the person optimizes for, protects, refuses, and is trying to become.",
        fields: [
          l("ranked_core_values", "Ranked core values", "Ordered by priority. Include built-ins or custom values.", "Friendship\nTruth\nCuriosity\nService"),
          f("custom_values", "Custom values", "textarea", "Values not covered by the standard list.", "craft, sovereignty, stewardship"),
          f("core_motivation", "Core motivation", "textarea", "The deepest engine behind action.", "Make confusing situations survivable for the people they love."),
          f("optimizes_for", "What they optimize for", "textarea", "Decision utility function in plain language.", "Clarity, group safety, and practical next steps."),
          f("refuses_to_compromise", "What they refuse to compromise", "textarea", "Non-negotiables for character consistency.", "They will not betray a vulnerable ally for convenience."),
          f("what_tempts_them", "What tempts them", "textarea", "Pressure points that create drama.", "Being needed, being right, having the answer first."),
          f("trying_to_become", "What they are trying to become", "textarea", "Forward motion for growth arcs.", "Someone who trusts others enough to share the load.")
        ]
      },
      {
        id: "decision_making",
        title: "Decision-Making",
        note: "How the profile chooses, fails, recovers, and handles risk.",
        fields: [
          s("decision_style", "Decision style", ["research-first", "intuition-first", "consensus-seeking", "decisive", "cautious", "trial-and-error", "expert-guided"], "How they usually choose a path."),
          f("under_pressure_behavior", "Under pressure behavior", "textarea", "Default behavior when stakes rise.", "Gets quieter, prioritizes essentials, delegates cleanly."),
          f("common_blind_spot", "Common blind spot", "textarea", "What they often miss.", "Assumes everyone wants a solved problem more than emotional processing."),
          f("failure_mode", "Failure mode", "textarea", "How they break down or make mistakes.", "Takes over and becomes terse."),
          f("recovery_pattern", "Recovery pattern", "textarea", "How they return to balance.", "Apologizes with a concrete repair plan and revised boundaries."),
          s("risk_tolerance", "Risk tolerance", ["low", "medium", "high", "variable"], "Risk appetite for story and mechanics."),
          s("planning_horizon", "Planning horizon", ["immediate", "short-term", "long-term", "legacy"], "How far ahead they naturally think.")
        ]
      },
      {
        id: "social_relationship_model",
        title: "Social & Relationship Model",
        note: "How the profile bonds, disagrees, cares, and fits into groups.",
        fields: [
          s("group_role", "Group role", ["leader", "glue", "wildcard", "strategist", "mediator", "scout", "mentor", "fixer", "instigator", "observer"], "The role they naturally occupy in groups."),
          s("friendship_style", "Friendship style", ["protector", "teacher", "teammate", "entertainer", "problem solver", "listener", "challenger", "nurturer"], "How they show up for friends."),
          l("trust_building_factors", "Trust-building factors", "What increases trust.", "follow-through\nhonest constraints\nshared effort"),
          l("trust_breaking_factors", "Trust-breaking factors", "What damages trust.", "performative loyalty\nneedless secrecy"),
          f("how_they_show_care", "How they show care", "textarea", "Care language for dialogue and relationship simulation.", "Makes the plan easier, remembers needs, checks on basics."),
          f("how_they_handle_disagreement", "How they handle disagreement", "textarea", "Conflict handling inside relationships.", "Starts with reasons, then asks what outcome matters most."),
          f("relationship_notes", "Relationship notes", "textarea", "Extra social-model context.", "Warm with competent people; guarded around chaos without accountability."),
          rows("relationship_graph", "Relationship graph preparation", "related person | relationship type | trust 1-10 | conflict 1-10 | history 1-10 | influence 1-10 | notes", "Alex | mentor | 8 | 2 | 7 | 6 | old collaborator")
        ]
      },
      {
        id: "knowledge_domains",
        title: "Knowledge Domains",
        note: "Repeatable expertise entries for dialogue, quest logic, and AI hallucination guardrails.",
        fields: [
          rows("domains", "Knowledge domains", "domain name | expertise level | confidence | notes", "Parkour | expert | high confidence | founder-level historical knowledge")
        ]
      },
      {
        id: "humor_communication",
        title: "Humor & Communication",
        note: "Dialogue voice, humor, preferred topics, and example quotes.",
        fields: [
          l("humor_types", "Humor types", "One per line: dry, absurd, deadpan, satirical, self-deprecating, dark, playful, intellectual, chaotic.", "dry\ndeadpan\nintellectual"),
          s("communication_mode", "Communication mode", ["teacher", "debater", "storyteller", "listener", "researcher", "diplomat", "comedian", "coach", "analyst", "philosopher"], "Primary speaking function."),
          l("typical_phrases", "Typical phrases", "Lines or phrase patterns.", "Okay, three things.\nLet's separate facts from vibes."),
          l("vocabulary", "Vocabulary", "Words they reach for often.", "constraints\npattern\nsignal\nclean"),
          l("topics_they_bring_up", "Topics they bring up", "Conversation magnets.", "systems\nfood\nrisk\nwhy plans fail"),
          l("topics_they_avoid", "Topics they avoid", "Avoidance helps respectful generation.", "private family details\nmedical specifics"),
          f("voice_speech_rhythm", "Voice and speech rhythm", "textarea", "Cadence and sentence shape.", "Measured, concise, then a soft punchline."),
          f("dialogue_prompt_summary", "Dialogue prompt summary", "textarea", "LLM-ready voice instruction.", "Write concise, practical dialogue with dry humor and careful emotional reads."),
          l("example_quotes", "Example quotes", "Representative lines for dialogue generation.", "We can panic after we know what the problem is.\nThat is not a plan; that is a weather event.")
        ]
      },
      {
        id: "conflict_stress_response",
        title: "Conflict & Stress Response",
        note: "How pressure changes behavior and what restores trust.",
        fields: [
          l("when_challenged_tends_to", "When challenged, they tend to", "One per line: debate, withdraw, compromise, research, joke, take control, deflect, freeze.", "research\ndebate\ntake control"),
          l("stress_signals", "Stress signals", "Observable stress tells.", "shorter sentences\nless eye contact\nmore lists"),
          l("escalation_triggers", "Escalation triggers", "What makes conflict worse.", "bad-faith arguments\navoidable risk to friends"),
          l("de_escalation_methods", "De-escalation methods", "What helps them settle.", "clear facts\nfood\na concrete next step"),
          f("apology_style", "Apology style", "textarea", "How they repair.", "Direct apology plus changed process."),
          f("boundary_style", "Boundary style", "textarea", "How they set limits.", "Calm, firm, specific, with little appetite for debate."),
          l("boundaries", "Do-not-cross boundaries", "Private guardrails for respectful adaptation.", "Do not portray as cruel\nAvoid jokes about private family details")
        ]
      },
      {
        id: "signature_behaviors",
        title: "Signature Behaviors",
        note: "Repeatable behavior entries for recognition, comedy, and mechanics.",
        fields: [
          rows("behaviors", "Signature behaviors", "behavior | context | comedic exaggeration potential | game-use notes", "Opens twenty browser tabs | when fact-checking | high | can trigger Research Spiral mechanic")
        ]
      },
      {
        id: "narrative_engine",
        title: "Narrative Engine",
        note: "Story functions for character bibles, arcs, themes, and project adaptation.",
        fields: [
          f("personal_quest", "Personal quest", "textarea", "What they would pursue in story terms.", "Prove care can be practical without becoming control."),
          f("greatest_fear", "Greatest fear", "textarea", "Core fear that drives avoidance.", "Being useless when people are counting on them."),
          f("recurring_internal_conflict", "Recurring internal conflict", "textarea", "Inner contradiction.", "Wants trust but keeps preparing for everyone to drop the ball."),
          f("growth_arc", "Growth arc", "textarea", "Change over time.", "Learns to delegate emotional and practical risk."),
          f("shadow_version", "Shadow version", "textarea", "Unhealthy extreme.", "Controlling strategist who treats people like fragile systems."),
          f("best_self_version", "Best-self version", "textarea", "Aspirational extreme.", "A calm anchor who helps others become more capable."),
          f("running_joke", "Running joke", "textarea", "Recurring comic bit.", "Always has exactly the oddly specific tool needed."),
          l("symbolic_motifs", "Symbolic motifs", "Images, props, or symbols.", "compass\nchecklist\nwarm light in a messy room"),
          l("character_themes", "Character themes", "Abstract themes.", "care as logistics\ntrust as shared labor")
        ]
      },
      {
        id: "game_mechanics",
        title: "Game Mechanics",
        note: "Mechanics hooks for RPG, adventure, party, and simulation systems.",
        fields: [
          f("suggested_class_role", "Suggested class / role", "text", "System-neutral class or archetype.", "Planner / Support Lead"),
          l("party_roles", "Party roles", "Multi-select style list.", "support\ntactician\nsocial stabilizer"),
          l("passive_abilities", "Passive abilities", "Always-on mechanics.", "reads the room\ndetects weak plans"),
          l("active_abilities", "Active abilities", "Triggered mechanics.", "turn confusion into three actionable steps"),
          l("weaknesses", "Weaknesses", "Mechanical or narrative vulnerabilities.", "overload from ambiguity\ncontrol spiral"),
          l("status_effects", "Status effects", "States this character causes or receives.", "Focused\nOverextended\nResearch Spiral"),
          l("special_dialogue_triggers", "Special dialogue triggers", "When unique lines should fire.", "someone skips a meal\na plan has no owner"),
          l("traversal_abilities", "Traversal abilities", "Movement/exploration mechanics.", "finds efficient routes through crowded systems"),
          l("support_abilities", "Support abilities", "How they help allies mechanically.", "grant clarity bonus\nreduce panic"),
          l("failure_comedy_mechanics", "Failure / comedy mechanics", "How flaws become playable comedy.", "too many tabs obscure the obvious answer")
        ]
      },
      {
        id: "ai_generation_metadata",
        title: "AI Generation Metadata",
        note: "Prompt-ready summaries, canonical descriptions, tags, flags, and misrepresentation guardrails.",
        fields: [
          f("canonical_short_description", "Canonical short description", "textarea", "One compact identity line.", "A grounded strategist with dry humor who turns chaos into practical steps."),
          f("canonical_long_description", "Canonical long description", "textarea", "Longer stable description for LLM context.", "A calm, observant support character driven by friendship, clarity, and practical care."),
          f("behavioral_prompt_summary", "Behavioral prompt summary", "textarea", "How AI should simulate behavior.", "Prioritize clarity, protect allies, ask useful questions, avoid needless drama."),
          l("do_not_misrepresent", "Do-not-misrepresent list", "Guardrails for AI and adaptation.", "Do not make them cruel\nDo not reveal private contact information"),
          l("tags", "Tags", "Search and generation tags.", "strategist\nanchor\ndry wit"),
          l("project_usage_flags", "Project usage flags", "Allowed project targets.", "Oregon Fail\nWest Coast Crypto Cruise\nHTF Coder\nEmpirical Neoshamanism\nTao of Parkour\nGeneric NPC system"),
          f("generated_summary", "Generated summary", "textarea", "Editable generated profile summary.", "")
        ]
      }
    ];

    const DEFAULT_VALUE_ORDER = ["Truth", "Friendship", "Freedom", "Curiosity", "Mastery", "Security", "Family", "Status", "Creativity", "Justice", "Service", "Discovery", "Legacy", "Belonging"];

    function f(id, label, type, tip, placeholder) { return { id, label, type, tip, placeholder, max: type === "text" ? 220 : 1200 }; }
    function l(id, label, tip, placeholder) { return { id, label, type: "list", tip, placeholder, max: 1000 }; }
    function rows(id, label, format, placeholder) { return { id, label, type: "rows", tip: `Repeatable entries. Format: ${format}`, placeholder, max: 1400, format }; }
    function s(id, label, options, tip) { return { id, label, type: "select", options, tip }; }
    function b(id, label, tip) { return { id, label, type: "boolean", tip }; }

    const flatFields = FIELD_SECTIONS.flatMap(section => section.fields);
    const fieldsById = Object.fromEntries(flatFields.map(field => [field.id, field]));
    let importedExtensions = {};
    let importedWarnings = [];
    let dirty = false;

    function el(id) { return document.getElementById(id); }
    function nowIso() { return new Date().toISOString(); }
    function slugify(input) { return (input || "character").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "").slice(0, 70) || "character"; }
    function splitList(value) { return (value || "").split(/\n|,/).map(item => item.trim()).filter(Boolean); }
    function parseRows(value, keys) {
      return (value || "").split(/\n/).map(row => row.trim()).filter(Boolean).map(row => {
        const cells = row.split("|").map(cell => cell.trim());
        return Object.fromEntries(keys.map((key, index) => [key, cells[index] || ""]));
      });
    }
    function rowsToText(rows, keys) {
      if (!Array.isArray(rows)) return "";
      return rows.map(row => keys.map(key => row?.[key] || "").join(" | ")).join("\n");
    }
    function fieldValue(id) {
      const field = fieldsById[id];
      const node = el(id);
      if (!field || !node) return "";
      if (field.type === "boolean") return node.checked;
      if (field.type === "list") return splitList(node.value);
      if (field.type === "rows") return parseRows(node.value, rowKeys(id));
      return node.value.trim();
    }
    function setField(id, value) {
      const field = fieldsById[id];
      const node = el(id);
      if (!field || !node) return;
      if (field.type === "boolean") node.checked = Boolean(value);
      else if (field.type === "list") node.value = Array.isArray(value) ? value.join("\n") : (value || "");
      else if (field.type === "rows") node.value = Array.isArray(value) ? rowsToText(value, rowKeys(id)) : (value || "");
      else node.value = value || "";
    }
    function rowKeys(id) {
      return {
        relationship_graph: ["related_person", "relationship_type", "trust_level", "conflict_level", "history_level", "influence_level", "notes"],
        domains: ["domain_name", "expertise_level", "confidence", "notes"],
        behaviors: ["behavior", "context", "comedic_exaggeration_potential", "game_use_notes"]
      }[id] || ["value"];
    }
    function setStatus(message, type = "") {
      el("status").textContent = message;
      el("status").className = `status ${type}`;
    }
    function timestampSlug() { return nowIso().replace(/[-:]/g, "").replace(/\.\d{3}Z$/, "Z"); }

    function renderForm() {
      const form = el("profileForm");
      form.innerHTML = FIELD_SECTIONS.map((section, index) => `
        <details ${index < 3 ? "open" : ""} id="section-${section.id}">
          <summary>${section.title}</summary>
          <p class="section-note">${section.note}</p>
          <div class="grid">
            ${section.fields.map(renderField).join("")}
          </div>
        </details>
      `).join("");

    function renderField(field) {
      const tip = `<span class="tip" title="${escapeHtml(field.tip)}">?</span>`;
      const placeholder = field.placeholder ? ` placeholder="${escapeHtml(field.placeholder)}"` : "";
      if (field.type === "boolean") {
        return `<label class="check-row full"><input type="checkbox" id="${field.id}"><span>${field.label} ${tip}<span class="hint">${escapeHtml(field.tip)}</span></span></label>`;
      }
      if (field.type === "select") {
        return `<label>${field.label} ${tip}<select id="${field.id}">${field.options.map(option => `<option value="${escapeHtml(option)}">${escapeHtml(option)}</option>`).join("")}</select></label>`;
      }
      if (field.type === "text") return `<label>${field.label} ${tip}<input id="${field.id}" maxlength="${field.max}"${placeholder}></label>`;
      const classes = field.type === "rows" ? "full" : "";
      const rowHint = field.format ? `<span class="hint">Format: ${escapeHtml(field.format)}</span>` : "";
      return `<label class="${classes}">${field.label} ${tip}${rowHint}<textarea id="${field.id}" maxlength="${field.max}"${placeholder}></textarea><span class="counter"></span></label>`;
    }

    function escapeHtml(text) {
      return String(text || "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[char]));

    function buildProfile() {

    function pruneEmpty(value) {

    function markdownProfile(profile = buildProfile()) {
      const lines = ["# Character Profile", "", `Schema version: ${profile.schema_version}`, `Record ID: ${profile.metadata.record_id}`, `Updated: ${profile.metadata.updated_at}`, ""];
      const sectionMap = [

        ["Social & Relationship Model", profile.social_relationship_model], ["Knowledge Domains", profile.knowledge_domains],

        ["Signature Behaviors", profile.signature_behaviors], ["Narrative Engine", profile.narrative_engine],
        ["Game Mechanics", profile.game_mechanics], ["AI Generation Metadata", profile.ai_generation_metadata]
      ];
      sectionMap.forEach(([title, data]) => {
        lines.push(`## ${title}`, "");
        Object.entries(data).forEach(([key, value]) => {
          lines.push(`### ${humanize(key)}`, "", formatMarkdownValue(value), "");
        });
      });
      lines.push("## JSON", "", "```json", JSON.stringify(profile, null, 2), "```", "");

    }
    function formatMarkdownValue(value) {
      if (Array.isArray(value)) {
        if (!value.length) return "_Not provided._";
        if (typeof value[0] === "object") return value.map(row => `- ${Object.entries(row).map(([k, v]) => `${humanize(k)}: ${v || "n/a"}`).join("; ")}`).join("\n");
        return value.map(item => `- ${item}`).join("\n");
      }
      if (value && typeof value === "object") return "```json\n" + JSON.stringify(value, null, 2) + "\n```";
      return value ? String(value) : "_Not provided._";
    }
    function humanize(key) { return key.replace(/_/g, " ").replace(/\b\w/g, char => char.toUpperCase()); }

    async function copyText(text, message) {
      await navigator.clipboard.writeText(text);
      setStatus(message, "ok");
    }
    function downloadText(name, text, type = "text/plain") {
      const blob = new Blob([text], { type });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = name;

    async function downloadAll() {
      const profile = buildProfile();
      const schema = await fetch("schema/friend_descriptor_schema.json").then(r => r.ok ? r.text() : "{}").catch(() => "{}");
      const files = [
        ["full-profile.json", JSON.stringify(profile, null, 2)],
        ["compact-profile.json", JSON.stringify(compactProfile(profile), null, 2)],
        ["profile.md", markdownProfile(profile)],
        ["ai-context.md", aiContext(profile)],
        ["game-design-summary.md", gameDesignSummary(profile)],
        ["art-prompt.txt", artPrompt(profile)],
        ["dialogue-prompt.txt", dialoguePrompt(profile)],
        ["schema.json", schema]
      ];
      downloadText(`${profile.metadata.record_id || "character"}-profile-package-${timestampSlug()}.zip`, makeZip(files), "application/zip");
      dirty = false;
    }

    function makeZip(filePairs) {
      const encoder = new TextEncoder();
      const localParts = [], centralParts = [];
      let offset = 0;
      filePairs.forEach(([nameText, contentText]) => {
        const name = encoder.encode(nameText);
        const data = typeof contentText === "string" ? encoder.encode(contentText) : contentText;
        const crc = crc32(data);
        const local = new Uint8Array([...u32(0x04034b50), ...u16(20), ...u16(0), ...u16(0), ...u16(0), ...u16(0), ...u32(crc), ...u32(data.length), ...u32(data.length), ...u16(name.length), ...u16(0), ...name, ...data]);
        const central = new Uint8Array([...u32(0x02014b50), ...u16(20), ...u16(20), ...u16(0), ...u16(0), ...u16(0), ...u16(0), ...u32(crc), ...u32(data.length), ...u32(data.length), ...u16(name.length), ...u16(0), ...u16(0), ...u16(0), ...u16(0), ...u32(0), ...u32(offset), ...name]);
        localParts.push(local); centralParts.push(central); offset += local.length;
      });
      const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);
      const end = new Uint8Array([...u32(0x06054b50), ...u16(0), ...u16(0), ...u16(filePairs.length), ...u16(filePairs.length), ...u32(centralSize), ...u32(offset), ...u16(0)]);
      return new Blob([...localParts, ...centralParts, end], { type: "application/zip" });
    }
    function crc32(bytes) {
      let table = crc32.table;
      if (!table) {
        table = crc32.table = Array.from({ length: 256 }, (_, n) => {
          let c = n; for (let k = 0; k < 8; k++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1; return c >>> 0;
        });
      }
      let crc = -1; for (const byte of bytes) crc = (crc >>> 8) ^ table[(crc ^ byte) & 0xff]; return (crc ^ -1) >>> 0;
    }
    function u16(v) { return [v & 255, (v >>> 8) & 255]; }
    function u32(v) { return [v & 255, (v >>> 8) & 255, (v >>> 16) & 255, (v >>> 24) & 255]; }

    function validateProfile(profile) {
      const warnings = [];
      if (!profile.schema_version) warnings.push("Missing schema_version; defaulted to 2.0.0.");
      if (!profile.identity?.display_name) warnings.push("Missing display name.");
      if (!profile.consent?.permission_to_store) warnings.push("Permission to store is not checked.");
      if (!profile.consent?.permission_to_use_as_fictional_character) warnings.push("Permission to use as fictional character is not checked.");
      return warnings;
    }

    function migrateImport(input) {
      importedExtensions = { unknown_fields: {}, migrated_from: input.schema_version || input.schema || "unknown" };
      importedWarnings = [];
      const source = input.record || input;
      const set = {};
      if (source.schema_version === SCHEMA_VERSION) {
        flattenModern(source, set);
      } else {
        importedWarnings.push(`Imported ${source.schema_version || source.schema || "legacy"} and migrated safely to 2.0.0.`);
        flattenLegacy(source, set);
      }
      const knownTop = new Set(["schema_version", "schema_name", "metadata", "consent", "identity", "appearance", "personality", "motivation_values", "decision_making", "social_relationship_model", "knowledge_domains", "humor_communication", "conflict_stress_response", "signature_behaviors", "narrative_engine", "game_mechanics", "ai_generation_metadata", "privacy", "exports", "generated", "character_core", "voice_and_behavior", "narrative_design"]);
      importedExtensions.unknown_fields = Object.fromEntries(Object.entries(source).filter(([key]) => !knownTop.has(key)));
      flatFields.forEach(field => {
        setField(field.id, set[field.id] ?? defaultForField(field));
      });
      const profile = buildProfile();
      importedWarnings.push(...validateProfile(profile));

      dirty = false;
      setStatus("Imported and migrated profile.", "ok");

    function defaultForField(field) {

    function flattenModern(source, set) {
      Object.assign(set, source.identity, source.appearance, source.personality, source.motivation_values, source.decision_making, source.social_relationship_model, source.humor_communication, source.conflict_stress_response, source.narrative_engine, source.game_mechanics, source.ai_generation_metadata);
      set.domains = source.knowledge_domains?.domains || [];
      set.behaviors = source.signature_behaviors?.behaviors || [];
      set.consent_notes = source.consent?.notes || source.consent?.permission_notes || "";
      ["permission_to_store", "permission_to_use_as_fictional_character", "permission_to_use_for_art_prompts", "permission_to_reuse_across_projects", "permission_to_contact_for_clarification"].forEach(key => set[key] = source.consent?.[key] || false);

      Object.assign(set, {
        display_name: id.display_name || source.display_name || source.name || "",
        optional_contact: id.optional_contact || source.contact || "",
        in_world_name_or_nickname: id.in_world_name_or_nickname || source.nickname || "",
        pronouns: id.pronouns || source.pronouns || "",
        age_range: id.age_range || "",
        current_location_or_usual_setting: id.current_location_or_usual_setting || source.location || "",
        consent_notes: consent.permission_notes || "",
        visual_descriptors: app.visual_descriptors || source.visual_descriptors || "",
        clothing_style_props: app.clothing_style_props || source.clothing || "",
        default_expression: app.default_expression || "",
        movement_body_language: app.movement_body_language || source.body_language || "",
        source_image_notes: app.source_image_notes || "",
        personality_traits: pers.personality_traits || source.traits || [],
        custom_traits: pers.custom_traits || [],
        strengths: pers.strengths || [],
        flaws: pers.flaws || [],
        recurring_habits: voice.recurring_habits || source.habits || [],
        temptations: pers.temptations || [],
        ranked_core_values: core.core_motivations || source.motivations || DEFAULT_VALUE_ORDER,
        core_motivation: core.one_sentence_summary || source.summary || "",
        under_pressure_behavior: voice.behavior_under_pressure || "",
        how_they_show_care: voice.how_they_help_friends_allies || "",
        voice_speech_rhythm: voice.voice_speech_rhythm || "",
        dialogue_prompt_summary: voice.communication_style || "",
        boundaries: pers.boundaries || [],
        behaviors: (voice.signature_behaviors || []).map(behavior => ({ behavior, context: "", comedic_exaggeration_potential: "", game_use_notes: "" })),
        growth_arc: narrative.growth_arc || "",
        suggested_class_role: narrative.suggested_class_role || source.role || "",
        party_roles: narrative.potential_party_roles || [],
        active_abilities: narrative.mechanics_hooks || [],
        tags: narrative.character_tags || source.tags || [],

      });
      ["permission_to_store", "permission_to_use_as_fictional_character", "permission_to_use_for_art_prompts", "permission_to_reuse_across_projects", "permission_to_contact_for_clarification"].forEach(key => set[key] = consent[key] || false);
    }

    async function submitProfile() {
      const profile = buildProfile();

        setStatus(`Before submitting: ${warnings.join(" ")}`, "warn");

      }
      const payload = {
        subject: `Person profile submission: ${profile.identity.display_name || profile.identity.in_world_name_or_nickname}`,
        schema_version: SCHEMA_VERSION,
        submitted_at: nowIso(),
        display_name: profile.identity.display_name,

        game_design_summary: gameDesignSummary(profile),
        art_prompt: artPrompt(profile),
        dialogue_prompt: dialoguePrompt(profile)
      };
      try {
        const response = await fetch(SUBMISSION_ENDPOINT, { method: "POST", headers: { "Content-Type": "application/json", "Accept": "application/json" }, body: JSON.stringify(payload) });
        if (!response.ok) throw new Error(`Form service returned ${response.status}`);
        el("submission_status").value = "Submitted successfully.";
        dirty = false;
        setStatus("Submitted profile successfully.", "ok");
      } catch (error) {
        el("submission_status").value = "Submit failed. Downloaded backup package.";
        setStatus(`Submit failed: ${error.message}. Downloading backup package.`, "warn");
        await downloadAll();
      }
    }

    function handleImport(event) {

      reader.readAsText(file);
      event.target.value = "";

    el("downloadArtPromptBtn").addEventListener("click", () => downloadText(`art-prompt-${timestampSlug()}.txt`, artPrompt(), "text/plain"));
    el("downloadDialoguePromptBtn").addEventListener("click", () => downloadText(`dialogue-prompt-${timestampSlug()}.txt`, dialoguePrompt(), "text/plain"));
    el("copyShareLinkBtn").addEventListener("click", () => copyText(shareLink(), "Copied generated share link."));
    el("importFile").addEventListener("change", handleImport);
    el("resetBtn").addEventListener("click", resetForm);
  </script>
</body>
</html>
